<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Phoenix Phonics — CVC Words</title>
<style>
  :root {
    --a: #f8a5b8; --e: #7ec9b0; --i: #7fc4e8; --o: #c9a0dc; --u: #e8c85a;
    --bg: #fdf6ec; --ink: #3a3a3a; --shadow: rgba(0,0,0,.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; min-height: 100vh;
    overscroll-behavior: none;
  }
  header {
    text-align: center; padding: 18px 12px 8px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: .3px; }
  header p { margin: 4px 0 0; font-size: 13px; color: #8a8a8a; }

  main { flex: 1; padding: 12px 14px 90px; }

  /* ---- group grid ---- */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    border: none; border-radius: 22px; padding: 22px 14px;
    color: #fff; text-align: center; cursor: pointer;
    box-shadow: 0 6px 14px var(--shadow); transition: transform .08s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .card:active { transform: scale(.96); }
  .card .vowel { font-size: 40px; font-weight: 900; line-height: 1; }
  .card .eg { font-size: 15px; opacity: .95; font-weight: 600; }
  .card .cnt { font-size: 11px; opacity: .85; background: rgba(255,255,255,.25);
    padding: 2px 10px; border-radius: 20px; margin-top: 4px; }
  .grid .card:last-child { grid-column: 1 / -1; }

  /* ---- word view ---- */
  .word-header { text-align: center; margin-bottom: 6px; }
  .word-header .badge {
    display: inline-block; font-size: 26px; font-weight: 900; color: #fff;
    padding: 6px 22px; border-radius: 20px; box-shadow: 0 4px 10px var(--shadow);
    cursor: pointer;
  }
  .word-header .badge:active { transform: scale(.95); }
  .words { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
  .wcard {
    background: #fff; border-radius: 20px; padding: 18px 16px 20px;
    box-shadow: 0 4px 12px var(--shadow); text-align: center;
  }
  .wword {
    font-size: 46px; font-weight: 900; letter-spacing: 2px; margin: 0 0 12px;
    cursor: pointer; display: inline-block;
  }
  .wword:active { transform: scale(.95); }
  .ipa { font-size: 20px; color: #7a7a7a; margin: -4px 0 6px; font-weight: 600;
    font-family: "Segoe UI", "Lucida Grande", sans-serif; }
  .zh { font-size: 19px; color: #5a5a5a; margin: 0 0 14px; font-weight: 600; }
  .phon { display: flex; justify-content: center; gap: 10px; margin-bottom: 6px; }
  .sentence { font-size: 16px; color: #4a4a4a; margin: 14px 8px 4px; line-height: 1.4;
    cursor: pointer; background: #f7f2ea; border-radius: 12px; padding: 10px 12px; }
  .sentence:active { transform: scale(.98); }
  .ph {
    font-size: 30px; font-weight: 800; color: #fff;
    min-width: 46px; padding: 8px 4px; border-radius: 14px; cursor: pointer;
    box-shadow: 0 3px 7px var(--shadow); transition: transform .08s;
  }
  .ph:active { transform: scale(.9); }
  .hint { font-size: 12px; color: #9a9a9a; margin-top: 10px; }
  .speaker { font-size: 15px; color: #b56; margin-left: 8px; }

  /* ---- bottom bar ---- */
  .bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 12px; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(253,246,236,.95); backdrop-filter: blur(6px);
    border-top: 1px solid #eee;
  }
  .bar button {
    flex: 1; border: none; border-radius: 16px; padding: 15px;
    font-size: 17px; font-weight: 700; color: #fff; cursor: pointer;
    box-shadow: 0 4px 10px var(--shadow);
  }
  .bar button:active { transform: scale(.97); }
  .btn-back { background: #b0a89c; }
  .btn-refresh { background: #ef8b6a; }
  .hidden { display: none !important; }
</style>

<body>

/* ---------- IPA pronunciation (regular CVC: consonant · short-vowel · consonant) ---------- */
const IPA_C = { b:'b', c:'k', d:'d', f:'f', g:'ɡ', h:'h', j:'dʒ', k:'k', l:'l',
  m:'m', n:'n', p:'p', r:'r', s:'s', t:'t', v:'v', w:'w', x:'ks', y:'j', z:'z' };
const IPA_V = { a:'æ', e:'ɛ', i:'ɪ', o:'ɒ', u:'ʌ' };
function toIPA(word){
  return '/' + word.split('').map(ch =>
    (ch in IPA_V) ? IPA_V[ch] : (IPA_C[ch] || ch)
  ).join('') + '/';
}
const WORDS_PER_SET = 5;

/* letter -> phoneme sound hint for TTS (short, clear sounds) */
const PHONEME = {
  a:'ah', e:'eh', i:'ih', o:'aw', u:'uh',
  b:'buh', c:'kuh', d:'duh', f:'ff', g:'guh', h:'huh', j:'juh', k:'kuh',
  l:'luh', m:'mm', n:'nn', p:'puh', r:'rr', s:'sss', t:'tuh', v:'vuh',
  w:'wuh', x:'ks', z:'zz'
};

/* ---------- progress (localStorage) ---------- */
const STORE_KEY = 'phoenix_phonics_counts';
function loadCounts(){ try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ return {}; } }
function saveCounts(c){ try { localStorage.setItem(STORE_KEY, JSON.stringify(c)); } catch(e){} }
let counts = loadCounts();
function bump(word){ counts[word] = (counts[word]||0) + 1; saveCounts(counts); }
function groupTotal(g){ return g.words.reduce((s,w)=> s + (counts[w]||0), 0); }

/* ---------- weighted pick: least-practiced words favored ---------- */
function pickWords(group, n){
  const maxC = Math.max(0, ...group.words.map(w=>counts[w]||0));
  // weight = (maxC - count + 1); unseen/low-count words get higher weight
  const pool = group.words.map(w => ({ w, weight: (maxC - (counts[w]||0) + 1) }));
  const chosen = [];
  const avail = [...pool];
  while (chosen.length < n && avail.length){
    const total = avail.reduce((s,x)=>s+x.weight,0);
    let r = Math.random() * total;
    let idx = 0;
    for (; idx < avail.length; idx++){ r -= avail[idx].weight; if (r <= 0) break; }
    if (idx >= avail.length) idx = avail.length - 1;
    chosen.push(avail[idx].w);
    avail.splice(idx,1);
  }
  return chosen;
}

/* ---------- speech ---------- */
let voice = null;
/* known female English voice names across iOS / macOS / Chrome / Android */
const FEMALE_HINT = /(female|samantha|karen|moira|tessa|fiona|serena|allison|susan|zira|catherine|hazel|kate|amelie|victoria|ava|joanna|salli|kimberly|google uk english female|google us english)/i;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  const en = vs.filter(v=>/^en/i.test(v.lang));
  const gb = en.filter(v=>/en[-_]GB/i.test(v.lang));
  const us = en.filter(v=>/en[-_]US/i.test(v.lang));
  const female = list => list.find(v=>FEMALE_HINT.test(v.name) || /female/i.test(v.name));
  voice = female(gb) || female(us) || female(en) ||
          gb[0] || us[0] || en[0] || null;
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function makeUtter(text, rate){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = (voice && voice.lang) || 'en-GB';
  if (voice) u.voice = voice;
  u.rate = rate || 0.85;
  u.pitch = 1.05;
  return u;
}
let lastSpeakText = '', lastSpeakTime = 0;
function speak(text, rate){
  if (!('speechSynthesis' in window)) return;
  const now = Date.now();
  // guard: ignore an identical repeat within 350ms (mobile touch+click / TTS double-fire)
  if (text === lastSpeakText && (now - lastSpeakTime) < 350) return;
  lastSpeakText = text; lastSpeakTime = now;
  speechSynthesis.cancel();
  speechSynthesis.speak(makeUtter(text, rate));
}
/* speak a sequence of {text,rate} parts one after another, with a gap */
function speakSequence(parts){
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let i = 0;
  function next(){
    if (i >= parts.length) return;
    const part = parts[i++];
    const u = makeUtter(part.text, part.rate);
    u.onend = () => setTimeout(next, part.gap != null ? part.gap : 250);
    speechSynthesis.speak(u);
  }
  next();
}

/* single letter sound (phonics): vowel or consonant */
function letterSound(letter){ return PHONEME[letter] || letter; }

/* tap the word (🔊): say the whole word only */
function speakWord(w){ bump(w); speak(w, 0.75); }
/* tap a single letter: just its phonics sound */
function speakPhoneme(letter){ speak(letterSound(letter), 0.6); }

/* ---------- rendering ---------- */
const groupView = document.getElementById('groupView');
const wordView  = document.getElementById('wordView');
const wordsEl   = document.getElementById('words');
const badge     = document.getElementById('groupBadge');
const bar       = document.getElementById('bar');
const subtitle  = document.getElementById('subtitle');
let currentGroup = null;

function renderGroups(){
  groupView.innerHTML = '';
  GROUPS.forEach(g=>{
    const b = document.createElement('button');
    b.className = 'card';
    b.style.background = g.color;
    b.innerHTML = `<span class="vowel">${g.vowel}</span>
                   <span class="eg">as in “${g.eg}”</span>
                   <span class="cnt">practiced ${groupTotal(g)}×</span>`;
    b.onclick = ()=> openGroup(g);
    groupView.appendChild(b);
  });
}

function renderWords(list){
  wordsEl.innerHTML = '';
  list.forEach(w=>{
    const card = document.createElement('div');
    card.className = 'wcard';
    const phon = w.split('').map(ch=>
      `<span class="ph" style="background:${currentGroup.color}" data-l="${ch}">${ch}</span>`
    ).join('');
    const info = WORD_INFO[w] || { zh:'', s:'' };
    card.innerHTML = `
      <div class="wword" data-w="${w}">${w}<span class="speaker">🔊</span></div>
      <div class="ipa">${toIPA(w)}</div>
      <div class="zh">${info.zh}</div>
      <div class="phon">${phon}</div>
      <div class="sentence" data-s="${info.s.replace(/"/g,'&quot;')}">${info.s} 🔊</div>
      <div class="hint">tap a letter for its sound · tap the word or sentence to hear it</div>`;
    card.querySelector('.wword').onclick = ()=> speakWord(w);
    card.querySelectorAll('.ph').forEach(p=>{
      p.onclick = ()=> speakPhoneme(p.dataset.l);
    });
    const sEl = card.querySelector('.sentence');
    if (info.s) sEl.onclick = ()=> speak(info.s, 0.8);
    wordsEl.appendChild(card);
  });
}

/* ---------- navigation ---------- */
function openGroup(g){
  currentGroup = g;
  badge.textContent = g.vowel;
  badge.style.background = g.color;
  badge.onclick = ()=> speakPhoneme(g.key);
  subtitle.textContent = `Short ${g.vowel} — tap to listen`;
  groupView.classList.add('hidden');
  wordView.classList.remove('hidden');
  bar.classList.remove('hidden');
  renderWords(pickWords(g, WORDS_PER_SET));
}
function refreshWords(){
  if (currentGroup) renderWords(pickWords(currentGroup, WORDS_PER_SET));
}
function showGroups(){
  currentGroup = null;
  subtitle.textContent = 'Choose a short-vowel sound';
  wordView.classList.add('hidden');
  bar.classList.add('hidden');
  groupView.classList.remove('hidden');
  renderGroups();
}

renderGroups();
</script>
</body>
